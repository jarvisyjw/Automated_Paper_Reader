        env:
          DEBUG_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEBUG_BASE: ${{ secrets.OPENAI_API_BASE }}
          DEBUG_MODEL: ${{ secrets.OPENAI_MODEL_NAME }}
        run: |
          if [ -n "$DEBUG_KEY" ]; then echo "KEY is SET (length: ${#DEBUG_KEY})"; else echo "KEY is EMPTY or NOT SET"; fi
          if [ -n "$DEBUG_BASE" ]; then echo "BASE is SET (length: ${#DEBUG_BASE})"; else echo "BASE is EMPTY or NOT SET"; fi
          if [ -n "$DEBUG_MODEL" ]; then echo "MODEL is SET (length: ${#DEBUG_MODEL})"; else echo "MODEL is EMPTY or NOT SET"; fi

