name: Daily Paper Report

on:
  schedule:
    # Daily at 00:00 UTC (adjust to your timezone)
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD, leave empty for today)"
        required: false
        type: string
      positive_keywords:
        description: "Positive keywords, one per line or comma-separated"
        required: false
        type: string
      negative_keywords:
        description: "Negative keywords, one per line or comma-separated"
        required: false
        type: string
      arxiv_categories:
        description: "arXiv categories, one per line or comma-separated"
        required: false
        type: string
      candidate_limit:
        description: "Max candidates after retrieval/ranking"
        required: false
        type: string
      model_preset:
        description: "Model to use for summarization"
        required: false
        default: "default-secret"
        type: choice
        options:
          - default-secret
          - qwen-plus
          - qwen-max
          - qwen-turbo
          - qwen3.6-plus
          - custom
      custom_model_name:
        description: "Custom model name; used only when model_preset is custom"
        required: false
        type: string
      llm_limit:
        description: "Limit candidates sent to LLM; useful for test runs"
        required: false
        type: string
      timeout_seconds:
        description: "LLM request timeout in seconds"
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "daily-report"
  cancel-in-progress: false

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

