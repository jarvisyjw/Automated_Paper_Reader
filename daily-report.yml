name: Daily Paper Report

on:
  schedule:
    # Daily at 00:00 UTC (adjust to your timezone)
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD, leave empty for today)"
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "daily-report"
  cancel-in-progress: false

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd paper-daily
          pip install -r requirements.txt

      - name: Fetch candidates
        run: |
          cd paper-daily
          python scripts/daily_papers.py --config config.yaml --date "${{ inputs.date || 'today' }}" --stage fetch --force

      - name: Generate LLM report
        env:
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL_NAME: ${{ secrets.OPENAI_MODEL_NAME }}
        run: |
          cd paper-daily
          python scripts/llm_report.py --config config.yaml --date "${{ inputs.date || 'today' }}"

      - name: Build Pages site
        run: |
          SCRIPT_DIR=$(cd paper-daily && pwd)
          DATE="${{ inputs.date || $(date -u +%Y-%m-%d) }}"
          REPORT_FILE="reports/${DATE}.md"

          # Ensure docs directory structure
          mkdir -p docs/reports

          # Copy latest report
          if [ -f "paper-daily/${REPORT_FILE}" ]; then
            cp "paper-daily/${REPORT_FILE}" "docs/reports/"

            # Update report index
            python3 - "${SCRIPT_DIR}" "${DATE}" << 'PYEOF'
          import json, sys, os, glob
          from pathlib import Path

          script_dir = sys.argv[1]
          today_str = sys.argv[2]

          # Load existing index
          idx_path = Path("docs/report-index.json")
          index = json.loads(idx_path.read_text()) if idx_path.exists() else []

          # Scan all reports in docs/reports/
          existing_files = {r["file"] for r in index}
          for f in sorted(Path("docs/reports").glob("*.md"), reverse=True):
              if f.name not in existing_files:
                  date_str = f.stem  # YYYY-MM-DD
                  index.append({
                      "date": date_str,
                      "file": f.name,
                      "title": f"AIPR Report — {date_str}",
                      "count": "?",
                  })

          # Update today's entry with actual count if scored.json exists
          scored_path = Path(script_dir) / "data" / "processed" / f"{today_str}_scored.json"
          if scored_path.exists():
              scored = json.loads(scored_path.read_text())
              for r in index:
                  if r["date"] == today_str:
                      r["count"] = str(scored.get("candidate_count", "?"))
                      r["title"] = f"AIPR Report — {today_str}"

          # Sort by date descending, ensure unique by file
          seen = set()
          unique = []
          for r in sorted(index, key=lambda x: x["date"], reverse=True):
              if r["file"] not in seen:
                  seen.add(r["file"])
                  unique.append(r)

          Path("docs/report-index.json").write_text(json.dumps(unique, indent=2))
          PYEOF
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily report update [skip ci]"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy-pages:
    needs: generate-report
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
