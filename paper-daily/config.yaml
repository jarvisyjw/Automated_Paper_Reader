research_profile:
  language: en
  goal: >
    Act as a research assistant for a researcher working on robotics and
    autonomous driving, with a special focus on 3D vision and modeling the 3D
    world through explicit and implicit representations. My previous research
    includes SLAM, 3D reconstruction, 3D Gaussian representations,
    vision-language navigation, visual localization, monocular depth
    estimation, and robot navigation. My current priorities are feed-forward
    3D reconstruction, global localization, and memory design for
    vision-language navigation. I am also interested in world models,
    multi-sensor calibration, visual place recognition, and loop closure
    detection. I have strong experience in robust robot deployment and
    autonomous driving deployment, so prioritize papers that are technically
    novel, practically deployable, and likely to inspire reliable real-world
    robotic or driving systems. When ranking papers, prefer work with clear 3D
    geometry, spatial memory, localization, mapping, navigation, multi-sensor
    perception, or world-modeling contributions over generic machine learning
    papers.
